# render.yaml — Render Infrastructure Blueprint
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: aces
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn eval_system.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: aces-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.6"

databases:
  - name: aces-db
    plan: free
    databaseName: aces
    user: aces
