{% extends 'base.html' %}

{% block content %}
<h1 style="margin-bottom: 1.5rem;">Create Assessment for {{ job.title }}</h1>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
    </div>
    {% endfor %}
    <div class="flex">
        <button type="submit" class="btn btn-primary">Create</button>
        <a href="{% url 'job_detail' pk=job.pk %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
