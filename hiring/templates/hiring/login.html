{% extends 'base.html' %}

{% block content %}
<div class="card brutalist-corners brutalist-border" style="max-width: 400px; margin: 4rem auto; padding: 3rem; background: var(--card-bg); border-radius: 0px !important;">
    <h1 style="margin-bottom: 1.75rem; font-weight: 600; letter-spacing: -0.02em;">Login</h1>
    <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
        <div class="message error">
            {{ form.non_field_errors|striptags }}
        </div>
        {% endif %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; height: 52px; font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase;">Login</button>
    </form>
    <p class="mt-2 text-muted">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
</div>
{% endblock %}
